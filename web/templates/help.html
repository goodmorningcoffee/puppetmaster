{% extends "base.html" %}

{% block title %}PUPPETMASTER — Help &amp; Documentation{% endblock %}

{% block body %}

  <div class="cp-section"><span class="title cp-cyan">Help &amp; Documentation</span></div>

  <div class="cp-panel cp-panel-pink">
    <div class="cp-panel-title">⟨ HELP &amp; DOCUMENTATION ⟩</div>
    <div class="cp-bright cp-bold">What would you like help with?</div>
  </div>

  <nav class="cp-menu" aria-label="Help menu">
    <button class="cp-menu-item" data-route="/help/overview" data-key="1">
      <span class="key">[1]</span><span class="icon">📖</span><span class="label">How PUPPETMASTER works</span>
    </button>
    <button class="cp-menu-item" data-route="/help/signals" data-key="3">
      <span class="key">[3]</span><span class="icon">🔬</span><span class="label">Signal types explained</span>
    </button>
    <button class="cp-menu-item" data-route="/help/outputs" data-key="4">
      <span class="key">[4]</span><span class="icon">📊</span><span class="label">Output files explained</span>
    </button>
    <button class="cp-menu-item" data-route="/" data-key="5">
      <span class="key">[5]</span><span class="icon">←</span><span class="label">Back to main menu</span>
    </button>
  </nav>

{% endblock %}

{% block scripts %}
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const first = document.querySelector('.cp-menu-item');
    if (first) first.focus();
  });
  document.querySelectorAll('.cp-menu-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const route = btn.dataset.route;
      if (route) window.location.href = route;
    });
  });
</script>
{% endblock %}
